name: Release Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install nfpm
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.42.0/nfpm_2.42.0_Linux_x86_64.tar.gz \
            | tar -xz -C "$HOME/.local/bin" nfpm
          chmod +x "$HOME/.local/bin/nfpm"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build release artifacts
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: ./scripts/release/build-artifacts.sh

      - name: Generate Homebrew formula
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          CHECKSUMS_FILE: dist/release/checksums.txt
          OUTPUT: dist/release/opencarapace.rb
        run: ./scripts/release/generate-homebrew-formula.sh

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.tar.gz
            dist/release/*.deb
            dist/release/*.pkg.tar.zst
            dist/release/checksums.txt
            dist/release/opencarapace.rb
